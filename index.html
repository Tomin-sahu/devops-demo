<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Welcome to DevOps Demo 🚀</h1>
      <p>This app is deployed using Jenkins and Minikube.</p>
      <button onclick="showMessage()">Click Me</button>
      <p id="msg"></p>
    </div>

    <script>
      function showMessage() {
        document.getElementById("msg").innerText = "Deployment Successful!";
      }
    </script>
  </body>
</html>
